<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>

    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Custom CSS -->
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="bg-gray-900 text-white flex items-center justify-center min-h-screen">

    <div class="bg-gray-800 p-8 rounded-2xl shadow-xl max-w-xl w-full text-center">
        
        <h1 class="text-3xl font-bold mb-6">Motivational Quotes</h1>

        <!-- Loader -->
        <div id="loader" class="hidden flex justify-center mb-4">
            <div class="w-8 h-8 border-4 border-yellow-500 border-dashed rounded-full animate-spin"></div>
        </div>

        <!-- Quote Text -->
        <p id="quote" class="text-lg italic mb-4 opacity-0 transition-opacity duration-700">
            Click the button to get a quote...
        </p>

        <!-- Author -->
        <p id="author" class="text-sm text-gray-400 mb-6 opacity-0 transition-opacity duration-700"></p>

        <!-- Buttons -->
        <div class="flex justify-center gap-4">
            <button id="newQuoteBtn"
                class="bg-yellow-500 hover:bg-yellow-600 text-black font-semibold px-6 py-3 rounded-lg transition">
                New Quote
            </button>

            <button id="copyBtn"
                class="bg-gray-700 hover:bg-gray-600 text-white px-4 py-3 rounded-lg transition">
                Copy
            </button>
        </div>

    </div>

    <!-- JS -->
    <script src="assets/js/app.js"></script>

</body>
</html>
