<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Quote Generator</title>
    <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body>
    <div class="container">
        <header>
            <h1>🧾 Quote Generator</h1>
            <p>Get your daily dose of motivation</p>
        </header>
        
        <main>
            <div class="quote-card">
                <div class="quote-text" id="quoteText">
                    Click the button below to get an inspiring quote!
                </div>
                <div class="quote-author" id="quoteAuthor"></div>
            </div>
            
            <div class="controls">
                <button id="getQuoteBtn" class="btn-primary">Get New Quote</button>
                <button id="copyQuoteBtn" class="btn-secondary">Copy Quote</button>
            </div>
            
            <div class="loading" id="loading">
                <div class="spinner"></div>
                <p>Loading quote...</p>
            </div>
            
            <div class="notification" id="notification"></div>
        </main>
    </div>
    
    <script src="assets/js/app.js"></script>
</body>
</html>
